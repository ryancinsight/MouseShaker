[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "debuginfo=0","-C", "target-feature=+crt-static,+sse3,+avx,+avx2","-C", "link-arg=-fuse-ld=lld","-C","target-cpu=native","-C", "llvm-args=-vectorize-loops", "-C", "llvm-args=-vectorize-slp","-Z","tune-cpu=native", "-C","target-cpu=native","-Z","location-detail=none" ]

[target.x86_64-pc-windows-gnu]
linker = "clang"
rustflags = ["-C","link-arg=-fvisibility=hidden", "-C", "debuginfo=0","-C", "target-feature=+crt-static,+sse3,+avx,+avx2","-C", "link-arg=-fuse-ld=lld","-C","target-cpu=native","-C", "llvm-args=-enable-tbaa","-C", "llvm-args=-vectorize-loops", "-C", "llvm-args=-vectorize-slp"]

[target.x86_64-unknown-linux-musl]
linker="lld"

# Tell cc-rs to use clang when building C dependencies (mimalloc, rpmalloc, etc.)
# on this windows-gnu/clang toolchain instead of falling back to gcc.exe.
[env]
CC = "clang"
